[db]
path = db/delta001_db
max_time_nodata = 30

[sensor_manager]
name = DELTA001
frequency = 5
export_time = 480

[logs]
path = logs/app.log
size = 5242880
backups = 2 

[NETWORK]
# Destination for Phase 1 & 2 UDP Packets (Your PC)
target_ip = 192.168.1.7
target_port = 5000

[TRIGGER_THRESHOLDS]
# Tier 1: Absolute Alarms (Critical States)
co2_critical_high = 1500
pm_critical_high = 35
temp_critical_low = 18.0
temp_critical_high = 28.0
hum_critical_low = 30.0
hum_critical_high = 70.0
lux_critical_low = 5.0
lux_critical_high = 1000.0

# Tier 2: Relative Changes (Delta / Step)
co2_delta = 50
pm_delta = 10
temp_step = 0.5
hum_step = 3.0
lux_step = 50.0

# Heartbeat Timer (in seconds)
alarm_heartbeat_interval = 300